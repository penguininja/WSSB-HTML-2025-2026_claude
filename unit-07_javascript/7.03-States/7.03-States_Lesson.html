<!--
7.03 JavaScript + CSS: States and classList

What is a "state"?
A state is a condition something can be in. A light switch is either on or off.
Web page elements have states too:
  - A menu can be open or closed
  - Text can be highlighted or normal
  - A page can be in dark mode or light mode

The big idea:
  CSS defines what each state LOOKS like.
  JavaScript decides which state is currently ACTIVE.

Instead of writing style changes directly in JavaScript like this:
  document.body.style.backgroundColor = 'black';

...we write a CSS class that describes the state:
  .dark-mode {
    background-color: black;
    color: white;
  }

Then JavaScript just adds or removes that class.
This keeps our code organized: CSS handles appearance, JS handles behavior.


classList.add() - turning a state ON
  element.classList.add('class-name');
  This is the same as writing class="class-name" in your HTML, but JavaScript does it live.

classList.remove() - turning a state OFF
  element.classList.remove('class-name');
  Removes the class. All the CSS rules inside that class stop applying.
