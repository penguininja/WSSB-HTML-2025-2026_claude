<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>7.02 Buttons Lab</title>
</head>
<body>

<main>
  <h1 id="title" aria-live="polite">My Interactive Page</h1>
  <p id="message" aria-live="polite">Click a button to see what happens!</p>

  <button id="title-btn">Change Title</button>
  <button id="message-btn">Change Message</button>
  <button id="color-btn">Change Background Color</button>

  <h2 id="subtitle" aria-live="polite">Subtitle Here</h2>
  <p id="description" aria-live="polite">This is a description that can be changed.</p>
</main>

<script src="script.js"></script>

</body>
</html>
