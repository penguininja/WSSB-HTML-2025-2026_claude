<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>7.01 JavaScript Lab Solution</title>
</head>
<body>

<!--
7.01 JavaScript Introduction - Lab Solution
Topic: Simple personal page with JavaScript text changes
-->

<main>
  <h1 id="message">Loading...</h1>
  <h2 id="subtitle">Please wait</h2>
  <p id="description">This text will change when the page loads.</p>
  <p>JavaScript makes websites interactive and dynamic!</p>
</main>

<script>
  // Change the main heading
  const message = document.querySelector('#message');
  message.textContent = 'Welcome to My Page!';
  
  // Change the subtitle
  const subtitle = document.querySelector('#subtitle');
  subtitle.textContent = 'About Me';
  
  // Change the description
  const description = document.querySelector('#description');
  description.textContent = 'Hi! I\'m learning JavaScript and web development. This page demonstrates how JavaScript can change text when the page loads.';
</script>

</body>
</html>
