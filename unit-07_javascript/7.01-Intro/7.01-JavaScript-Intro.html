<!--
7.01 JavaScript Introduction

What is JavaScript?
JavaScript makes websites interactive. While HTML creates structure and CSS adds styling, JavaScript adds behavior and interactivity.

JavaScript can:
- Change content on the page
- Respond to user clicks and interactions
- Update information without reloading the page
- Create animations and effects

How to add JavaScript:
1. External file: <script src="script.js"></script>
2. Internal: <script>code here</script>

Basic JavaScript Example:
-->

<main>
  <h1 id="greeting">Hello, world!</h1>
  <p>Welcome to JavaScript!</p>

  <p>JavaScript changed the text above from "Hello, world!" to "Hello, class!" when the page loaded.</p>
</main>

<script>
  // This JavaScript finds the heading and changes its text
  const heading1 = document.querySelector('#greeting');
  heading1.textContent = 'Hello, class!';
</script>

<!--
Key JavaScript Concepts:

1. document.querySelector() - finds HTML elements
(Case is important!)
2. textContent - changes the text inside an element
3. Elements have IDs (#greeting) that JavaScript can target

JavaScript Syntax:
- Lines end with semicolons ;
- Text goes in quotes 'like this'
- Comments start with //
