6.04 Media Queries Lab

Do Now:
Open 6.04-Media-Queries-Lab/index.html in your browser.
Use the Chrome DevTools device toolbar (Ctrl+Shift+M or Cmd+Shift+M) to
resize the page to different widths: 375px, 768px, and 1200px.
Notice how the base styles are designed for a phone. What needs to change

Lab Overview:

In this lab you will practice writing CSS media queries using a
mobile-first approach. The base styles are already written for phone
screens. You will add min-width media queries to improve the layout
as the screen gets wider. Do NOT edit index.html.

Specifically, you will only add new CSS to the bottom of style.css.
You should not have to edit any of the existing CSS.

Mobile-First Approach:
  - Base CSS = phone layout (everything stacked, single column)
  - min-width media queries = add complexity for wider screens
  - We ONLY use min-width — never max-width

The page is a community center website with:
  - A menu bar across the top (logo + navigation links)
  - A main content area (welcome text, program cards, events list)
  - A sidebar (hours, contact info, quick links)
  - A footer

Files:
  6.04-Media-Queries-Lab/index.html  — DO NOT EDIT this file
  6.04-Media-Queries-Lab/style.css   — EDIT this file (scroll to the bottom)

Setup:
1. Open both files in your code editor
2. Open index.html in your browser
3. Open Chrome DevTools and turn on the device toolbar (Ctrl+Shift+M)
4. Scroll to the bottom of style.css — that is where you will work

Reminder — Media Query Syntax (min-width only):

  @media (min-width: 481px) {
    .selector {
      property: value;
    }
  }


Lab Tasks:

Task 1 — Larger phones and small tablets (min-width: 481px)
  a) Make the menu bar horizontal (logo left, links right)
  b) Change the menu bar background color to #2c5f2d
  c) Allow cards to sit side by side (two per row)
  d) Show the Quick Links section in the sidebar

Task 2 — Tablets and laptops (min-width: 769px)
  a) Put the main content and sidebar side by side
  b) Give the main content more space than the sidebar
  c) Increase the h1 font-size to 1.75rem
  d) Show each event on a single row instead of wrapping

Task 3 — Large desktops (min-width: 1024px)
  a) Increase h1 font-size to 3rem
  b) Increase the menu link font-size to 1.5rem

Testing Checklist:
  [ ] At 375px wide: stacked menu, single-column cards, Quick Links hidden
  [ ] At 481px wide: horizontal menu, two-column cards, Quick Links visible
  [ ] At 769px wide: sidebar beside main content, events on one line
  [ ] At 1024px wide: large headings, bigger nav text
  [ ] No horizontal scrollbar at any width
  [ ] All links are still clickable and readable at every size

Bonus Challenges:
  - On larger phones (481px+), lay out event details on one line
  - On desktops (769px+), add more gap between the menu links
