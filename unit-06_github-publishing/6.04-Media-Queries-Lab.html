Do Now:
Open 6.04-Media-Queries-Lab/index.html in your browser.

Lab Overview:

In this lab you will practice writing CSS media queries to make a webpage
look good on phones, tablets, and desktops. The HTML is already written
for you — you will ONLY edit the style.css file.

The page is a community center website with:
  - A menu bar across the top (logo + navigation links)
  - A main content area (welcome text, program cards, events table)
  - A sidebar (hours, contact info, quick links)
  - A footer

Files:
  6.04-Media-Queries-Lab/index.html  — DO NOT EDIT this file
  6.04-Media-Queries-Lab/style.css   — EDIT this file (scroll to the bottom)

Setup:
1. Open both files in your code editor
2. Open index.html in your browser
3. Open Chrome DevTools and turn on the device toolbar (Ctrl+Shift+M)
4. Scroll to the bottom of style.css — that is where you will work

Reminder — Media Query Syntax:

  @media (max-width: 768px) {
    .selector {
      property: value;
    }
  }

  @media (min-width: 1024px) {
    .selector {
      property: value;
    }
  }


Lab Tasks:

Task 1 — Tablet breakpoint (max-width: 768px)
  a) Stack the page layout vertically (sidebar below main content)
  b) Make the sidebar stretch to full width
  c) Reduce the h1 font-size to 1.5rem

Task 2 — Phone breakpoint (max-width: 480px)
  a) Stack the menu bar vertically (logo on top, links below)
  b) Center the menu links and reduce the gap between them
  c) Make the program cards stack in a single column
  d) Reduce the table text and padding so it fits on a small screen

Task 3 — Large desktop (min-width: 1024px)
  a) Increase h1 font-size to 2.25rem
  b) Increase the menu link font-size to 1.125rem

Testing Checklist:
  [ ] At 1200px wide: large headings, side-by-side layout, bigger nav text
  [ ] At 768px wide: sidebar stacks below main content, smaller h1
  [ ] At 480px wide: menu stacks vertically, single-column cards, smaller table
  [ ] No horizontal scrollbar at any width
  [ ] All links are still clickable and readable at every size

Bonus Challenges:
  - Hide the sidebar Quick Links section on screens under 480px
  - Change the menu bar background color at the phone breakpoint
  - Make the events table scroll horizontally on very small screens

When you are finished, raise your hand so your teacher can check your
responsive layout at each breakpoint.
